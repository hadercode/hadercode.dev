server {
    listen 80;
    server_name localhost;

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        # Intenta cargar el URI directo, luego con barra invertida (como directorio),
        # luego busca un archivo .html correspondiente y finalmente cae a 404
        try_files $uri $uri/ $uri.html /404.html;
    }

    error_page 404 /404.html;
    location = /404.html {
        root /usr/share/nginx/html;
        internal;
    }

    # Control de caché óptimo para assets estáticos
    location ~* \.(?:css|js|jpg|jpeg|gif|png|ico|svg|webp|woff|woff2)$ {
        root /usr/share/nginx/html;
        expires 1y;
        add_header Cache-Control "public, no-transform";
    }
}
